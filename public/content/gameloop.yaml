# Game loop dialogue: welcome, victory, vault interactions, etc.

welcome:
  lines:
    - text: "Welcome aboard the Starship Alexandria."
    - text: "After the cataclysm, Earth's great works of literature were scattered across the ruins."
    - text: "Your mission: beam down to the surface, recover fragments of lost texts, and rebuild humanity's library."
    - text: "The archives await their first acquisitions. Press Space or Enter to begin your expedition."

victory:
  lines:
    - text: "The final fragment has been recovered."
    - text: "Against all odds, you have preserved the treasures of human civilization."
    - text: "The Alexandria's archives are complete. Future generations will read these words and know that we endured."
    - text: "Thank you, Librarian. Your mission is complete."
    - text: "You may continue to explore your collection. When you're ready, start a New Game to begin again."

vault:
  alreadyOpened:
    - text: "The vault stands open. Whatever secrets it held have already been claimed."
  
  # These templates use placeholders: {code} for the formatted code, {artifactName} and {artifactDescription} for artifact details
  openWithArtifact:
    - text: "You recall the code from the note you found. Your fingers find the dial: {code}."
    - text: "The lock clicks open with a satisfying thunk."
    - text: "Inside, nestled in faded velvet, you find something unexpected: {artifactName}."
    - text: "{artifactDescription}"
    - text: "You pocket it carefully. Some things are worth saving."
  
  openEmpty:
    - text: "You recall the code from the note you found. Your fingers find the dial: {code}."
    - text: "The lock clicks open with a satisfying thunk."
    - text: "The vault is empty. Someone else got here first."
  
  locked:
    - text: "A sturdy vault, sealed tight. A mechanical dial shows four digits."
    - text: "You try the handle, but it won't budge. Someone around here might know the combination..."
